<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deferred Smart Discharge Simulation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; color: #00d4ff; font-size: 1.5em; }
  .subtitle { text-align: center; margin-bottom: 24px; color: #888; font-size: 0.9em; }
  .params { text-align: center; margin-bottom: 20px; color: #aaa; font-size: 0.85em; }
  .params span { color: #00d4ff; font-weight: bold; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
  .scenario { background: #16213e; border-radius: 12px; padding: 16px; border: 1px solid #0f3460; }
  .scenario.old-approach { border-color: #5c2020; background: #1a1520; }
  .scenario h3 { color: #00d4ff; margin-bottom: 4px; font-size: 1em; }
  .scenario .desc { color: #888; font-size: 0.8em; margin-bottom: 10px; }
  .scenario .result { font-size: 0.85em; margin-top: 8px; padding: 8px; border-radius: 6px; }
  .result.ok { background: rgba(0, 200, 100, 0.15); border: 1px solid rgba(0, 200, 100, 0.3); }
  .result.fail { background: rgba(255, 60, 60, 0.15); border: 1px solid rgba(255, 60, 60, 0.3); }
  canvas { width: 100%; border-radius: 6px; background: #0a0a1a; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; font-size: 0.75em; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; font-size: 0.78em; }
  .stat { text-align: center; padding: 4px; background: rgba(255,255,255,0.03); border-radius: 4px; }
  .stat .val { color: #00d4ff; font-weight: bold; font-size: 1.1em; }
  .stat .lbl { color: #888; }
</style>
</head>
<body>
<h1>Deferred Smart Discharge Simulation</h1>
<p class="subtitle">Validates that deferred self-use + full-power burst achieves feed-in targets without grid import</p>
<p class="params">
  Inverter: <span>15 kW</span> &nbsp;|&nbsp;
  Window: <span>18:00 - 20:00</span> &nbsp;|&nbsp;
  Feed-in target: <span>10 kWh</span> &nbsp;|&nbsp;
  Min SoC: <span>30%</span> &nbsp;|&nbsp;
  Battery: <span>20 kWh</span> &nbsp;|&nbsp;
  Headroom: <span>10% (20% for feed-in)</span> &nbsp;|&nbsp;
  Tick: <span>60s</span>
</p>
<div class="grid" id="scenarios"></div>

<script>
// ── Simulation parameters ──────────────────────────────────────────
const MAX_POWER_W = 15000;
const BATTERY_CAP_KWH = 20;
const MIN_SOC = 30;
const FEEDIN_LIMIT_KWH = 10;
const HEADROOM = 0.10;
const FEEDIN_HEADROOM = 0.20; // doubled for feed-in deadline
const TICK_S = 60;
const WINDOW_START_H = 18, WINDOW_END_H = 20;
const TOTAL_TICKS = (WINDOW_END_H - WINDOW_START_H) * 3600 / TICK_S; // 120

// ── House load profiles ────────────────────────────────────────────
function steadyLoad(kw) {
  return (_tick) => kw;
}
function burstyLoad(baseKw, spikeKw, spikeIntervalTicks, spikeDurationTicks) {
  return (tick) => {
    const cycle = tick % spikeIntervalTicks;
    return cycle < spikeDurationTicks ? spikeKw : baseKw;
  };
}
function rampLoad(startKw, endKw) {
  return (tick) => startKw + (endKw - startKw) * (tick / TOTAL_TICKS);
}

// ── Algorithm: calculate_discharge_deferred_start ──────────────────
function calcDeferredStart(currentSoc, minSoc, capKwh, maxPowerW,
                            remainingTicks, netConsumptionKw, feedinLimitKwh) {
  const maxPowerKw = maxPowerW / 1000;
  if (maxPowerKw <= 0) return TOTAL_TICKS; // never start

  // SoC deadline
  let socDeadlineTicks = TOTAL_TICKS;
  const energyToDischKwh = (currentSoc - minSoc) / 100 * capKwh;
  if (energyToDischKwh > 0) {
    const consumption = Math.max(0, netConsumptionKw);
    let effectiveKw = maxPowerKw - consumption;
    if (effectiveKw <= 0) {
      // house load alone drains battery — no forced discharge needed for SoC
      effectiveKw = 0;
    }
    if (effectiveKw > 0) {
      const dischHours = energyToDischKwh / effectiveKw;
      const bufferedHours = dischHours / (1 - HEADROOM);
      const bufferedTicks = bufferedHours * 3600 / TICK_S;
      socDeadlineTicks = remainingTicks - bufferedTicks;
    }
  }

  // Feed-in energy deadline (use doubled headroom)
  let feedinDeadlineTicks = TOTAL_TICKS;
  if (feedinLimitKwh != null && feedinLimitKwh > 0) {
    const consumption = Math.max(0, netConsumptionKw);
    let effectiveExportKw = maxPowerKw - consumption;
    if (effectiveExportKw <= 0) {
      effectiveExportKw = maxPowerKw * 0.1;
    }
    const feedinHours = feedinLimitKwh / effectiveExportKw;
    const bufferedHours = feedinHours / (1 - FEEDIN_HEADROOM);
    const bufferedTicks = bufferedHours * 3600 / TICK_S;
    feedinDeadlineTicks = remainingTicks - bufferedTicks;
  }

  return Math.max(0, Math.min(socDeadlineTicks, feedinDeadlineTicks));
}

// ── Algorithm: calculate_discharge_power ───────────────────────────
function calcDischargePower(currentSoc, minSoc, capKwh, remainingH,
                             maxPowerW, netConsumptionKw, feedinRemainingKwh) {
  let energyKwh = (currentSoc - minSoc) / 100 * capKwh;
  if (energyKwh <= 0) return 100;
  if (remainingH <= 0) return maxPowerW;

  if (feedinRemainingKwh != null && feedinRemainingKwh >= 0 && remainingH > 0) {
    const houseAbsorptionKwh = Math.max(0, netConsumptionKw) * remainingH;
    const maxDrainKwh = feedinRemainingKwh + houseAbsorptionKwh;
    if (maxDrainKwh < energyKwh) {
      energyKwh = maxDrainKwh;
      if (energyKwh <= 0) return 100;
    }
  }

  let effectiveH = remainingH * (1 - HEADROOM);
  if (effectiveH <= 0) effectiveH = remainingH;
  let powerKw = energyKwh / effectiveH;
  powerKw -= Math.max(0, netConsumptionKw);
  powerKw *= (1 + HEADROOM);
  let powerW = powerKw * 1000;

  // Floor at house consumption to prevent grid import.
  // Skip when consumption exceeds inverter capacity (unavoidable).
  const consumptionW = Math.max(0, netConsumptionKw) * 1000;
  if (consumptionW > 0 && consumptionW <= maxPowerW) {
    powerW = Math.max(powerW, consumptionW);
  }

  return Math.max(100, Math.min(Math.round(powerW), maxPowerW));
}

// ── Run one scenario ───────────────────────────────────────────────
function simulate(initSoc, loadFn, { noDefer = false } = {}) {
  let soc = initSoc;
  let dischargingStarted = false;
  let cumulativeFeedinKwh = 0;
  let lastPowerW = 0;

  const log = {
    soc: [], dischargePowerKw: [], houseLoadKw: [],
    gridFlowKw: [], feedinKwh: [], deferred: [],
  };
  let gridImportOccurred = false;     // during active phase only
  let maxGridImportKw = 0;
  let selfUseImportKwh = 0;           // expected — house load from grid when battery at min
  let transitionTick = -1;

  for (let tick = 0; tick < TOTAL_TICKS; tick++) {
    const houseKw = loadFn(tick);
    const remainingTicks = TOTAL_TICKS - tick;
    const remainingH = remainingTicks * TICK_S / 3600;

    let dischPowerW = 0;
    let gridKw = 0;

    if (!dischargingStarted && !noDefer) {
      // Deferred phase: self-use. Battery serves house load naturally.
      const availEnergyKwh = (soc - MIN_SOC) / 100 * BATTERY_CAP_KWH;
      const maxSelfUseKw = Math.min(houseKw, availEnergyKwh / (TICK_S / 3600));
      const selfUseKwh = maxSelfUseKw * (TICK_S / 3600);
      soc -= (selfUseKwh / BATTERY_CAP_KWH) * 100;

      // Grid: if house > battery can provide, grid makes up the difference
      const shortfall = houseKw - maxSelfUseKw;
      gridKw = -shortfall; // negative = import

      // Check if we should transition
      const feedinRemaining = FEEDIN_LIMIT_KWH - cumulativeFeedinKwh;
      const deferredTick = calcDeferredStart(
        soc, MIN_SOC, BATTERY_CAP_KWH, MAX_POWER_W,
        remainingTicks, houseKw, feedinRemaining > 0 ? feedinRemaining : null
      );

      if (tick >= deferredTick || soc <= MIN_SOC) {
        dischargingStarted = true;
        transitionTick = tick;
        // Calculate initial paced power
        const feedinRem = FEEDIN_LIMIT_KWH - cumulativeFeedinKwh;
        dischPowerW = calcDischargePower(
          soc, MIN_SOC, BATTERY_CAP_KWH, remainingH,
          MAX_POWER_W, houseKw, feedinRem > 0 ? feedinRem : null
        );
        lastPowerW = dischPowerW;

        // Apply discharge this tick
        const dischKwh = dischPowerW / 1000 * (TICK_S / 3600);
        soc -= (dischKwh / BATTERY_CAP_KWH) * 100;
        // Undo the self-use drain we already applied
        soc += (selfUseKwh / BATTERY_CAP_KWH) * 100;

        // Grid export = discharge - house
        const exportKw = dischPowerW / 1000 - houseKw;
        gridKw = exportKw;
        if (exportKw > 0) {
          cumulativeFeedinKwh += exportKw * (TICK_S / 3600);
        }
      }
    } else {
      if (!dischargingStarted) {
        // noDefer mode: immediately start on first tick
        dischargingStarted = true;
        transitionTick = 0;
      }
      // Active phase: forced discharge with pacing
      if (soc <= MIN_SOC) {
        dischPowerW = 0;
        gridKw = -houseKw; // grid supplies house
      } else {
        const feedinRemaining = FEEDIN_LIMIT_KWH - cumulativeFeedinKwh;
        const remainH = remainingH;

        dischPowerW = calcDischargePower(
          soc, MIN_SOC, BATTERY_CAP_KWH, remainH,
          MAX_POWER_W, houseKw,
          feedinRemaining > 0 ? feedinRemaining : null
        );

        // If feedin target already met, stop discharging
        if (cumulativeFeedinKwh >= FEEDIN_LIMIT_KWH) {
          dischPowerW = 0;
        }

        lastPowerW = dischPowerW;
        const dischKwh = dischPowerW / 1000 * (TICK_S / 3600);
        soc -= (dischKwh / BATTERY_CAP_KWH) * 100;

        // Grid: export = discharge - house (house served from discharge)
        const exportKw = dischPowerW / 1000 - houseKw;
        gridKw = exportKw;
        if (exportKw > 0) {
          cumulativeFeedinKwh += exportKw * (TICK_S / 3600);
        }
      }
    }

    if (gridKw < -0.01) {
      if (dischargingStarted) {
        gridImportOccurred = true;
        maxGridImportKw = Math.max(maxGridImportKw, -gridKw);
      } else {
        selfUseImportKwh += (-gridKw) * (TICK_S / 3600);
      }
    }

    // Clamp SoC
    soc = Math.max(0, Math.min(100, soc));

    log.soc.push(soc);
    log.dischargePowerKw.push(dischPowerW / 1000);
    log.houseLoadKw.push(houseKw);
    log.gridFlowKw.push(gridKw);
    log.feedinKwh.push(cumulativeFeedinKwh);
    log.deferred.push(!dischargingStarted);
  }

  return {
    log, gridImportOccurred, maxGridImportKw, selfUseImportKwh,
    transitionTick, finalFeedinKwh: cumulativeFeedinKwh, finalSoc: soc,
  };
}

// ── Chart drawing ──────────────────────────────────────────────────
function drawChart(canvas, data, yConfigs, transitionTick) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = { top: 10, right: 12, bottom: 28, left: 44 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // Find global Y range
  let yMin = Infinity, yMax = -Infinity;
  for (const cfg of yConfigs) {
    if (cfg.yMin !== undefined) yMin = Math.min(yMin, cfg.yMin);
    if (cfg.yMax !== undefined) yMax = Math.max(yMax, cfg.yMax);
    for (const v of cfg.data) {
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
  }
  // Add padding
  const yRange = yMax - yMin || 1;
  yMin -= yRange * 0.05;
  yMax += yRange * 0.05;

  function xPos(i) { return pad.left + (i / (TOTAL_TICKS - 1)) * cw; }
  function yPos(v) { return pad.top + ch - ((v - yMin) / (yMax - yMin)) * ch; }

  // Deferred region shading
  if (transitionTick > 0) {
    ctx.fillStyle = 'rgba(0, 212, 255, 0.06)';
    ctx.fillRect(pad.left, pad.top, xPos(transitionTick) - pad.left, ch);
    // Label
    ctx.fillStyle = 'rgba(0, 212, 255, 0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    const midX = pad.left + (xPos(transitionTick) - pad.left) / 2;
    ctx.fillText('self-use', midX, pad.top + 14);
  }

  // Zero line if range crosses zero
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, yPos(0));
    ctx.lineTo(W - pad.right, yPos(0));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Transition line
  if (transitionTick > 0 && transitionTick < TOTAL_TICKS) {
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(xPos(transitionTick), pad.top);
    ctx.lineTo(xPos(transitionTick), pad.top + ch);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid import region highlight (red)
  for (const cfg of yConfigs) {
    if (cfg.label === 'Grid') {
      for (let i = 0; i < cfg.data.length; i++) {
        if (cfg.data[i] < -0.01) {
          const x = xPos(i);
          ctx.fillStyle = 'rgba(255, 60, 60, 0.15)';
          ctx.fillRect(x - 1, yPos(0), 3, yPos(cfg.data[i]) - yPos(0));
        }
      }
    }
  }

  // Draw lines
  for (const cfg of yConfigs) {
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = cfg.thick ? 2 : 1.5;
    ctx.globalAlpha = cfg.alpha || 1;
    ctx.beginPath();
    for (let i = 0; i < cfg.data.length; i++) {
      const x = xPos(i), y = yPos(cfg.data[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Fill under for certain lines
    if (cfg.fill) {
      ctx.fillStyle = cfg.fill;
      ctx.lineTo(xPos(cfg.data.length - 1), yPos(0));
      ctx.lineTo(xPos(0), yPos(0));
      ctx.closePath();
      ctx.fill();
    }
  }

  // Axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.lineTo(W - pad.right, pad.top + ch);
  ctx.stroke();

  // Y labels
  ctx.fillStyle = '#888';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  const ySteps = 5;
  for (let i = 0; i <= ySteps; i++) {
    const v = yMin + (yMax - yMin) * (i / ySteps);
    const y = yPos(v);
    ctx.fillText(v.toFixed(1), pad.left - 4, y + 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  }

  // X labels (time)
  ctx.textAlign = 'center';
  ctx.fillStyle = '#888';
  for (let h = WINDOW_START_H; h <= WINDOW_END_H; h++) {
    const tick = (h - WINDOW_START_H) * 3600 / TICK_S;
    const x = xPos(Math.min(tick, TOTAL_TICKS - 1));
    ctx.fillText(`${h}:00`, x, H - 4);
  }
  // Half hours
  for (let h = WINDOW_START_H; h < WINDOW_END_H; h++) {
    const tick = (h - WINDOW_START_H + 0.5) * 3600 / TICK_S;
    const x = xPos(tick);
    ctx.fillStyle = '#555';
    ctx.fillText(`${h}:30`, x, H - 4);
  }
}

// ── Render scenarios ───────────────────────────────────────────────
const scenarios = [
  {
    title: '1. High SoC, low steady load',
    desc: 'SoC 90% | House 0.5 kW steady — easy case, plenty of energy and export headroom',
    initSoc: 90, loadFn: steadyLoad(0.5),
  },
  {
    title: '2. High SoC, moderate steady load',
    desc: 'SoC 90% | House 2 kW steady — house eats into export capacity',
    initSoc: 90, loadFn: steadyLoad(2),
  },
  {
    title: '3. High SoC, high steady load',
    desc: 'SoC 90% | House 5 kW steady — significant export reduction, tests headroom',
    initSoc: 90, loadFn: steadyLoad(5),
  },
  {
    title: '4. Medium SoC, low load',
    desc: 'SoC 60% | House 0.5 kW steady — limited energy budget above min SoC',
    initSoc: 60, loadFn: steadyLoad(0.5),
  },
  {
    title: '5. High SoC, bursty load (EV charger) — DEFERRED',
    desc: 'SoC 90% | 0.5 kW base + 7 kW spikes every 10 min (3 min duration) — deferred approach',
    initSoc: 90, loadFn: burstyLoad(0.5, 7, 10, 3),
  },
  {
    title: '5b. Same bursty load — OLD PACING (no deferral)',
    desc: 'SoC 90% | Same load profile — immediate ForceDischarge with pacing. Compare grid import!',
    initSoc: 90, loadFn: burstyLoad(0.5, 7, 10, 3), noDefer: true,
  },
  {
    title: '6. Medium SoC, bursty load',
    desc: 'SoC 55% | 1 kW base + 5 kW spikes every 8 min (2 min duration)',
    initSoc: 55, loadFn: burstyLoad(1, 5, 8, 2),
  },
  {
    title: '7. High SoC, ramping load',
    desc: 'SoC 85% | Load ramps 0.5 kW → 6 kW over the window',
    initSoc: 85, loadFn: rampLoad(0.5, 6),
  },
  {
    title: '8. Low SoC (SoC-constrained)',
    desc: 'SoC 45% | House 1 kW — may not reach feed-in target due to min SoC',
    initSoc: 45, loadFn: steadyLoad(1),
  },
  {
    title: '9. High SoC, extreme bursty — DEFERRED',
    desc: 'SoC 90% | 0.5 kW base + 12 kW spikes every 15 min (5 min). Tests near-inverter-limit spikes',
    initSoc: 90, loadFn: burstyLoad(0.5, 12, 15, 5),
  },
  {
    title: '9b. Same extreme bursty — OLD PACING',
    desc: 'SoC 90% | Same profile — pacing at ~5kW means 12kW spike causes 7kW grid import',
    initSoc: 90, loadFn: burstyLoad(0.5, 12, 15, 5), noDefer: true,
  },
];

const container = document.getElementById('scenarios');

for (const sc of scenarios) {
  const result = simulate(sc.initSoc, sc.loadFn, { noDefer: sc.noDefer || false });
  const { log, gridImportOccurred, maxGridImportKw, selfUseImportKwh,
          transitionTick, finalFeedinKwh, finalSoc } = result;

  const div = document.createElement('div');
  div.className = 'scenario' + (sc.noDefer ? ' old-approach' : '');

  const transitionMin = transitionTick >= 0 ? (transitionTick * TICK_S / 60) : -1;
  const transitionTime = transitionTick >= 0
    ? `${WINDOW_START_H}:${String(Math.round(transitionMin)).padStart(2, '0')}`
    : 'never';

  // Power chart
  const powerCanvas = document.createElement('canvas');
  powerCanvas.width = 600; powerCanvas.height = 200;

  // SoC + feedin chart
  const socCanvas = document.createElement('canvas');
  socCanvas.width = 600; socCanvas.height = 160;

  div.innerHTML = `<h3>${sc.title}</h3><p class="desc">${sc.desc}</p>`;

  const powerLabel = document.createElement('div');
  powerLabel.style.cssText = 'color:#666; font-size:0.7em; margin-top:6px;';
  powerLabel.textContent = 'Power (kW) — discharge, house load, grid flow';
  div.appendChild(powerLabel);
  div.appendChild(powerCanvas);

  const socLabel = document.createElement('div');
  socLabel.style.cssText = 'color:#666; font-size:0.7em; margin-top:6px;';
  socLabel.textContent = 'SoC (%) and cumulative feed-in (kWh)';
  div.appendChild(socLabel);
  div.appendChild(socCanvas);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';
  const items = [
    ['#ff9800', 'Discharge'], ['#e91e63', 'House load'],
    ['#4caf50', 'Grid export'], ['#f44336', 'Grid import'],
    ['#00bcd4', 'SoC %'], ['#ffc107', 'Feed-in kWh'],
    ['rgba(0,212,255,0.2)', 'Self-use phase'],
  ];
  for (const [c, l] of items) {
    legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${l}</div>`;
  }
  div.appendChild(legend);

  // Stats
  const statsDiv = document.createElement('div');
  statsDiv.className = 'stats';
  statsDiv.innerHTML = `
    <div class="stat"><div class="val">${transitionTime}</div><div class="lbl">Transition</div></div>
    <div class="stat"><div class="val">${finalFeedinKwh.toFixed(2)}</div><div class="lbl">Feed-in kWh</div></div>
    <div class="stat"><div class="val">${finalSoc.toFixed(1)}%</div><div class="lbl">Final SoC</div></div>
    <div class="stat"><div class="val" style="color:${gridImportOccurred ? '#f44336' : '#4caf50'}">${gridImportOccurred ? maxGridImportKw.toFixed(2) + ' kW' : 'None'}</div><div class="lbl">Active-phase import</div></div>
  `;
  div.appendChild(statsDiv);

  // Result summary
  const resultDiv = document.createElement('div');
  const feedinMet = finalFeedinKwh >= FEEDIN_LIMIT_KWH * 0.98;
  const socOk = finalSoc >= MIN_SOC - 0.5;
  const allGood = !gridImportOccurred && feedinMet && socOk;
  const partial = !feedinMet && finalSoc <= MIN_SOC + 1;
  resultDiv.className = `result ${allGood || partial ? 'ok' : 'fail'}`;

  let msg = '';
  if (allGood) {
    msg = `Target met: ${finalFeedinKwh.toFixed(1)} kWh exported, SoC ${finalSoc.toFixed(1)}%, no grid import.`;
  } else if (partial) {
    msg = `SoC-constrained: only ${finalFeedinKwh.toFixed(1)} / ${FEEDIN_LIMIT_KWH} kWh exported (battery hit min SoC). Expected.`;
  } else {
    const issues = [];
    if (gridImportOccurred) issues.push(`grid import ${maxGridImportKw.toFixed(2)} kW`);
    if (!feedinMet) issues.push(`feed-in short: ${finalFeedinKwh.toFixed(1)} / ${FEEDIN_LIMIT_KWH} kWh`);
    if (!socOk) issues.push(`SoC ${finalSoc.toFixed(1)}% below min ${MIN_SOC}%`);
    msg = `Issues: ${issues.join(', ')}`;
  }
  resultDiv.textContent = msg;
  div.appendChild(resultDiv);

  container.appendChild(div);

  // Draw charts
  drawChart(powerCanvas, log, [
    { data: log.dischargePowerKw, color: '#ff9800', label: 'Discharge', thick: true },
    { data: log.houseLoadKw, color: '#e91e63', label: 'House', alpha: 0.7 },
    { data: log.gridFlowKw, color: '#4caf50', label: 'Grid',
      fill: 'rgba(76, 175, 80, 0.08)' },
  ], transitionTick);

  drawChart(socCanvas, log, [
    { data: log.soc, color: '#00bcd4', label: 'SoC', thick: true, yMin: 0, yMax: 100 },
    { data: log.feedinKwh, color: '#ffc107', label: 'Feed-in' },
  ], transitionTick);
}
</script>
</body>
