name: E2E Tests

on:
  push:
    branches: [develop]
  pull_request:

env:
  E2E_WORKERS: 12

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      seed: ${{ steps.split.outputs.seed }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - name: Collect and split tests
        id: split
        run: |
          seed=$RANDOM
          echo "seed=$seed" >> "$GITHUB_OUTPUT"

          python -m pytest tests/e2e/ -m slow --co -q --randomly-seed=$seed 2>/dev/null \
            | grep '::' > all_tests.txt

          python3 -c "
          import json, math, os

          workers = int(os.environ['E2E_WORKERS'])
          tests = open('all_tests.txt').read().splitlines()
          per_worker = math.ceil(len(tests) / workers)
          groups = []
          for i in range(workers):
              chunk = tests[i * per_worker : (i + 1) * per_worker]
              if chunk:
                  groups.append({'worker': i, 'tests': ' '.join(chunk)})
          print(f'Split {len(tests)} tests across {len(groups)} workers')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={json.dumps({\"include\": groups})}\n')
          "

  e2e:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.collect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - run: playwright install chromium
      - name: Build E2E container
        run: podman build -t ha-foxess-e2e tests/e2e/

      - name: "Run E2E (worker ${{ matrix.worker }})"
        run: |
          python -m pytest ${{ matrix.tests }} \
            --randomly-seed=${{ needs.collect.outputs.seed }} \
            -n auto \
            --tb=long \
            --junitxml=e2e-w${{ matrix.worker }}.xml \
            -v

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-results-w${{ matrix.worker }}
          path: |
            e2e-w${{ matrix.worker }}.xml
            tests/e2e/screenshots/
          retention-days: 14

  results:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: results

      - name: Summarise
        run: |
          shopt -s nullglob
          passed=0; failed=0; skipped=0; found=0
          for f in results/*/e2e-*.xml; do
            found=$((found + 1))
            p=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1 || true)
            f_count=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1 || true)
            s_count=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1 || true)
            passed=$((passed + ${p:-0} - ${f_count:-0} - ${s_count:-0}))
            failed=$((failed + ${f_count:-0}))
            skipped=$((skipped + ${s_count:-0}))
          done

          echo "## E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | Failed | Skipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| $passed | $failed | $skipped |" >> $GITHUB_STEP_SUMMARY

          if [ "$found" -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**No XML result files found.**" >> $GITHUB_STEP_SUMMARY
            ls -R results/ >> $GITHUB_STEP_SUMMARY 2>&1 || true
            exit 1
          fi

          if [ "$failed" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failures" >> $GITHUB_STEP_SUMMARY
            for f in results/*/e2e-*.xml; do
              grep -A2 '<failure' "$f" 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
            done
            exit 1
          fi
