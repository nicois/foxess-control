name: E2E Tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      worker0: ${{ steps.split.outputs.worker0 }}
      worker1: ${{ steps.split.outputs.worker1 }}
      seed: ${{ steps.split.outputs.seed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - name: Collect and split tests
        id: split
        run: |
          seed=$RANDOM
          echo "seed=$seed" >> "$GITHUB_OUTPUT"

          # Collect test node IDs, shuffle with seed, split into 2 groups
          python -m pytest e2e/ -m slow --co -q --randomly-seed=$seed 2>/dev/null \
            | grep '::' > all_tests.txt

          total=$(wc -l < all_tests.txt)
          half=$(( (total + 1) / 2 ))

          head -n "$half" all_tests.txt > w0.txt
          tail -n +"$((half + 1))" all_tests.txt > w1.txt

          # Output as space-separated node IDs
          echo "worker0=$(paste -sd ' ' w0.txt)" >> "$GITHUB_OUTPUT"
          echo "worker1=$(paste -sd ' ' w1.txt)" >> "$GITHUB_OUTPUT"

          echo "Split $total tests: $(wc -l < w0.txt) + $(wc -l < w1.txt)"

  e2e:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        worker: [0, 1]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - run: playwright install chromium
      - name: Build E2E container
        run: podman build -t ha-foxess-e2e e2e/

      - name: "Run E2E (worker ${{ matrix.worker }})"
        run: |
          if [ "${{ matrix.worker }}" = "0" ]; then
            tests="${{ needs.collect.outputs.worker0 }}"
          else
            tests="${{ needs.collect.outputs.worker1 }}"
          fi

          python -m pytest $tests \
            --randomly-seed=${{ needs.collect.outputs.seed }} \
            -n auto \
            --tb=long \
            --junitxml=e2e-w${{ matrix.worker }}.xml \
            -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-w${{ matrix.worker }}
          path: |
            e2e-w${{ matrix.worker }}.xml
            e2e/screenshots/
          retention-days: 14

  results:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results

      - name: Summarise
        run: |
          passed=0; failed=0; skipped=0
          for f in results/*/e2e-*.xml; do
            p=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1)
            f_count=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            s_count=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1)
            passed=$((passed + ${p:-0} - ${f_count:-0} - ${s_count:-0}))
            failed=$((failed + ${f_count:-0}))
            skipped=$((skipped + ${s_count:-0}))
          done

          echo "## E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | Failed | Skipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| $passed | $failed | $skipped |" >> $GITHUB_STEP_SUMMARY

          if [ "$failed" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failures" >> $GITHUB_STEP_SUMMARY
            for f in results/*/e2e-*.xml; do
              grep -A2 '<failure' "$f" 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
            done
            exit 1
          fi
