name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Get manifest version
        id: manifest
        run: |
          version=$(jq -r .version custom_components/foxess_control/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify versions match
        run: |
          if [ "${{ steps.tag.outputs.version }}" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.tag.outputs.version }} does not match manifest version ${{ steps.manifest.outputs.version }}"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
