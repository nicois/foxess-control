name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Get manifest version
        id: manifest
        run: |
          version=$(jq -r .version custom_components/foxess_control/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify versions match
        run: |
          if [ "${{ steps.tag.outputs.version }}" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "::error::Tag v${{ steps.tag.outputs.version }} does not match manifest version ${{ steps.manifest.outputs.version }}"
            exit 1
          fi

      - name: Find previous stable tag
        id: prev
        run: |
          # List tags in version order, keep only stable (no hyphen after v prefix),
          # exclude the current tag, and take the latest.
          prev=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${GITHUB_REF_NAME}$" \
            | head -1)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          previous_tag: ${{ steps.prev.outputs.tag }}
