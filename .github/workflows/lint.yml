name: Lint & Test

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install semgrep
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - run: playwright install --with-deps chromium
      # Split into two invocations: pytest-playwright's session-scoped
      # event loop collides with pytest-asyncio's per-test runners on
      # Python 3.13 under xdist, causing "Runner.run() cannot be called
      # from a running event loop" across ~25 unrelated async tests.
      # Running card-browser tests in a separate pytest process avoids
      # the plugin-level interference.
      - run: pytest -m "not slow" --ignore=tests/test_card_entity_resolution.py --tb=short
      - run: pytest tests/test_card_entity_resolution.py --tb=short

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - run: pytest tests/test_performance.py -v
