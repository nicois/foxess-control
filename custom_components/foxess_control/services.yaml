clear_overrides:
  name: Clear overrides
  description: >-
    Clear overrides and return to self-use mode. If mode is specified,
    only overrides of that mode are removed; other overrides are retained.
  fields:
    mode:
      name: Mode
      description: >-
        Only clear overrides of this mode. If not set, all overrides are cleared.
      selector:
        select:
          options:
            - SelfUse
            - ForceCharge
            - ForceDischarge
            - Backup
            - Feedin

force_charge:
  name: Force charge
  description: >-
    Force the inverter to charge the battery for the specified duration.
    Replaces any existing force-charge overrides. Other overrides are
    retained. Aborts if the new window conflicts with a different mode.
  fields:
    duration:
      name: Duration
      description: How long to force charge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Charge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

force_discharge:
  name: Force discharge
  description: >-
    Force the inverter to discharge the battery for the specified duration.
    Replaces any existing force-discharge overrides. Other overrides are
    retained. Aborts if the new window conflicts with a different mode.
  fields:
    duration:
      name: Duration
      description: How long to force discharge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    min_soc:
      name: Minimum SoC
      description: >-
        Stop discharging when the battery reaches this state of charge (%).
      default: 10
      selector:
        number:
          min: 5
          max: 100
          unit_of_measurement: "%"
    power:
      name: Power limit
      description: >-
        Discharge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:
