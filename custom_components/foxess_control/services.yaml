clear_overrides:
  name: Clear overrides
  description: >-
    Return the inverter to self-use mode, clearing all or selected overrides.
  fields:
    mode:
      name: Mode
      description: >-
        Only clear overrides of this mode. If not set, all overrides are cleared.
      selector:
        select:
          options:
            - SelfUse
            - ForceCharge
            - ForceDischarge
            - Backup
            - Feedin

feedin:
  name: Feed-in
  description: >-
    Prioritise feeding excess solar to the grid for a set duration, optionally at a specific time and power limit.
  fields:
    duration:
      name: Duration
      description: How long to feed in (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Feed-in power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

force_charge:
  name: Force charge
  description: >-
    Charge the battery for a set duration, optionally at a specific time and power limit.
  fields:
    duration:
      name: Duration
      description: How long to force charge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Charge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:

force_discharge:
  name: Force discharge
  description: >-
    Discharge the battery for a set duration, optionally at a specific time and power limit.
  fields:
    duration:
      name: Duration
      description: How long to force discharge (max 4 hours, must not cross midnight).
      required: true
      selector:
        duration:
    power:
      name: Power limit
      description: >-
        Discharge power limit in watts. Defaults to inverter rated power if not set.
      selector:
        number:
          min: 100
          unit_of_measurement: W
    start_time:
      name: Start time
      description: >-
        Time of day to start the override. Defaults to now if not set.
      selector:
        time:
