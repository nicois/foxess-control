repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements

  - repo: local
    hooks:
      - id: sync-smart-battery
        name: sync vendored smart_battery
        language: system
        entry: bash -c 'rsync -a --delete --exclude="__pycache__" smart_battery/ custom_components/foxess_control/smart_battery/ && git add custom_components/foxess_control/smart_battery/'
        pass_filenames: false
        files: ^smart_battery/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: semgrep-architecture
        name: architectural lint (semgrep)
        language: system
        entry: semgrep --config .semgrep/ --error custom_components/foxess_control/ smart_battery/
        pass_filenames: false
        files: ^(custom_components/foxess_control/|smart_battery/).*\.py$
        types: [python]

      - id: check-module-size
        name: module size budget
        language: script
        entry: .githooks/check-module-size
        pass_filenames: false
        files: ^custom_components/foxess_control/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, responses, pytest, homeassistant, voluptuous]
